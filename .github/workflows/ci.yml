name: VaultSentry CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install pytest pytest-cov openpyxl

      - name: Syntax check (all Python files)
        run: |
          python -m py_compile config.py logger.py main.py
          for f in core/*.py utils/*.py gui/*.py; do
            python -m py_compile "$f" && echo "OK: $f"
          done

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=core --cov=utils \
            --cov-report=term-missing \
            --cov-fail-under=70

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Flake8 (errors only)
        run: |
          flake8 . \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics \
            --exclude=.git,__pycache__,build,dist
